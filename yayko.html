<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@uhqenjoyer</title>
  <meta name="theme-color" content="#060608">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Syne:wght@500;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      color-scheme: dark;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased
    }

    html,
    body {
      min-height: 100%;
      width: 100%;
      cursor: url("cursor.cur"), auto
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #10050b;
      color: #f5f3ef;
      overflow: hidden
    }

    a,
    button,
    input,
    select,
    [role=button] {
      cursor: url("cursor.cur"), pointer
    }

    img {
      display: block;
      max-width: 100%
    }

    button {
      font: inherit;
      border: none;
      background: none
    }

    ::selection {
      background: rgba(255, 105, 180, .32);
      color: #fff
    }

    body * {
      cursor: url("cursor.cur"), auto !important;
    }

    a,
    button,
    input,
    select,
    [role=button] {
      cursor: url("cursor.cur"), pointer !important;
    }

    :root {
      --bg: #10050b;
      --panel: rgba(20, 8, 15, .78);
      --line: rgba(255, 255, 255, .1);
      --text: #f5f3ef;
      --muted: rgba(245, 243, 239, .62);
      --accent: #ff69b4;
      --accent-soft: #ffd1ea;
      --accent-strong: #ff2f92;
      --accent-rgb: 255 105 180;
      --pink: #ff8ac8;
      --pink-rgb: 255 138 200;
    }

    /* â”€â”€â”€ SCENE â”€â”€â”€ */
    .scene {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 100vh;
      overflow: hidden;
      background: #10050b;
    }

    /* BG VIDEO */
    .scene__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(16px) saturate(1.18) brightness(.52);
      transform: scale(1.12);
      pointer-events: none;
    }

    .scene__vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 105, 180, .16), transparent 42%, rgba(255, 47, 146, .1)),
        radial-gradient(circle at center, transparent 18%, rgba(16, 5, 11, .52) 68%, rgba(0, 0, 0, .82) 100%);
    }

    /* â”€â”€â”€ CORNER PLAYER â”€â”€â”€ */
    .corner-player {
      position: fixed;
      top: .85rem;
      left: .85rem;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      padding: .6rem .75rem;
      border: 1px solid rgba(255, 105, 180, .18);
      border-radius: 14px;
      background: rgba(20, 8, 15, .72);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .55), 0 0 26px rgba(255, 105, 180, .08), inset 0 1px rgba(255, 255, 255, .07);
      backdrop-filter: blur(20px);
    }

    .corner-player__btn {
      flex: none;
      width: 2rem;
      height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .05);
      color: var(--text);
      transition: all .2s ease;
    }

    .corner-player__btn:hover {
      background: rgba(var(--accent-rgb)/.15);
      border-color: rgba(var(--accent-rgb)/.3);
    }

    .corner-player__btn svg {
      width: .85rem;
      height: .85rem;
    }

    .corner-player__copy {
      display: grid;
      gap: .15rem;
    }

    .corner-player__copy strong {
      color: var(--text);
      font-size: .78rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
    }

    .corner-player__bar {
      position: relative;
      width: 90px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .1);
      overflow: hidden;
    }

    .corner-player__fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-strong), var(--accent-soft));
      width: 22%;
    }

    /* â”€â”€â”€ CORNER STATUS â”€â”€â”€ */
    .corner-status {
      position: fixed;
      bottom: .85rem;
      right: .85rem;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .5rem .8rem;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 999px;
      background: rgba(8, 7, 12, .72);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .55);
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem;
      letter-spacing: .08em;
      color: rgba(245, 243, 239, .55);
    }

    .corner-status__dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6b7280;
    }

    /* â”€â”€â”€ PROFILE â”€â”€â”€ */
    .profile {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 100%;
      perspective: 1800px;
      transition: transform 0.55s cubic-bezier(0.25, 1, 0.5, 1);
    }

    body.crypto-open .profile {
      transform: translateX(-230px);
    }

    /* â”€â”€â”€ CARD â”€â”€â”€ */
    .profile-card {
      --rx: 0deg;
      --ry: 0deg;
      --sx: 0px;
      --sy: 0px;
      --gx: 50%;
      --gy: 28%;
      width: min(100%, 390px);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 138, 200, .09), rgba(255, 105, 180, .035)), rgba(18, 8, 15, .86);
      box-shadow: 0 0 0 1px rgba(255, 105, 180, .07) inset, 0 1px rgba(255, 255, 255, .07) inset, 0 40px 100px rgba(0, 0, 0, .7), 0 0 45px rgba(255, 105, 180, .08);
      backdrop-filter: blur(20px);
      transform: translate3d(var(--sx), var(--sy), 0) rotateX(var(--rx)) rotateY(var(--ry));
      transform-style: preserve-3d;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .profile-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at var(--gx) var(--gy), rgba(var(--accent-rgb)/.2), transparent 32%);
      opacity: .4;
      mix-blend-mode: screen;
      pointer-events: none;
      transition: opacity .12s ease;
    }

    .profile-card.tilting {
      border-color: rgba(var(--accent-rgb)/.2);
      box-shadow: 0 60px 140px rgba(0, 0, 0, .8), 0 0 36px rgba(var(--accent-rgb)/.1);
    }

    .profile-card.tilting::after {
      opacity: .7;
    }

    .profile-card.crypto-weaving {
      animation: mainCardCryptoPulse 1.25s cubic-bezier(0.25, 1, 0.5, 1);
      border-color: rgba(255, 105, 180, 0.36);
      box-shadow:
        0 0 0 1px rgba(255, 105, 180, .16) inset,
        0 0 46px rgba(255, 105, 180, .24),
        0 46px 120px rgba(0, 0, 0, .78);
    }

    .profile-card.crypto-weaving::after {
      opacity: .8;
    }

    @keyframes mainCardCryptoPulse {
      0% {
        transform: translate3d(var(--sx), var(--sy), 0) rotateX(var(--rx)) rotateY(var(--ry)) scale(1);
        filter: brightness(1);
      }

      38% {
        transform: translate3d(var(--sx), var(--sy), 0) rotateX(var(--rx)) rotateY(var(--ry)) scale(1.035);
        filter: brightness(1.16);
      }

      100% {
        transform: translate3d(var(--sx), var(--sy), 0) rotateX(var(--rx)) rotateY(var(--ry)) scale(1);
        filter: brightness(1);
      }
    }

    /* â”€â”€â”€ BANNER â”€â”€â”€ */
    .card-banner {
      position: relative;
      height: 175px;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .card-banner__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .card-banner__fallback {
      display: none;
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 60% at 75% 30%, rgba(200, 160, 255, .12) 0%, transparent 55%),
        radial-gradient(ellipse 60% 80% at 30% 60%, rgba(120, 60, 140, .18) 0%, transparent 60%),
        linear-gradient(160deg, #0f0318 0%, #1a0828 35%, #0c0117 60%, #080112 100%);
    }

    .card-banner__fallback::after {
      content: "";
      position: absolute;
      top: 28%;
      right: 40%;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, .95) 0%, rgba(255, 255, 255, .4) 40%, transparent 70%);
      box-shadow: 0 0 28px 12px rgba(200, 180, 255, .18), 0 0 60px 30px rgba(150, 120, 200, .08);
    }

    .card-banner__fallback::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 30% at 50% 55%, rgba(80, 50, 100, .25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 25% at 30% 65%, rgba(60, 30, 80, .2) 0%, transparent 65%);
    }

    .card-banner__shade {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0, 0, 0, .05), transparent 30%),
        linear-gradient(180deg, transparent 40%, rgba(10, 8, 14, .88));
    }

    .card-banner__copy {
      position: absolute;
      inset: auto auto 1rem 1rem;
      z-index: 2;
    }

    .card-banner__copy span {
      color: rgba(245, 243, 239, .45);
      font-family: 'JetBrains Mono', monospace;
      font-size: .58rem;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    /* â”€â”€â”€ BODY â”€â”€â”€ */
    .card-body {
      display: grid;
      justify-items: center;
      gap: .85rem;
      padding: 0 1.1rem 1.2rem;
    }

    /* â”€â”€â”€ AVATAR â”€â”€â”€ */
    .avatar-wrap {
      width: 76px;
      height: 76px;
      margin-top: -2.6rem;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 50%;
      background: rgba(10, 8, 14, .9);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .5);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .avatar-wrap .avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d1545, #1a0d2e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .avatar-wrap .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    /* â”€â”€â”€ IDENTITY â”€â”€â”€ */
    .identity {
      text-align: center;
      width: 100%;
    }

    .identity__head {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .identity__head h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      line-height: .92;
      letter-spacing: -.04em;
      color: #fff;
    }

    .identity__badges {
      display: inline-flex;
      align-items: center;
      gap: .22rem;
      padding: .28rem .38rem;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .2), inset 0 1px rgba(255, 255, 255, .08);
    }

    .identity__badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3rem;
      height: 1.3rem;
      font-size: .9rem;
      transition: transform .18s ease;
    }

    .identity__badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .identity__badge span {
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      font-weight: 800;
      text-shadow: 0 0 10px rgba(255, 105, 180, .65);
    }

    .identity__badge:hover {
      transform: translateY(-2px) scale(1.2);
    }

    .identity__badge::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + .45rem);
      transform: translate(-50%) translateY(4px);
      padding: .36rem .5rem;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: #0a0810f0;
      color: rgba(255, 255, 255, .85);
      font-family: 'JetBrains Mono', monospace;
      font-size: .54rem;
      letter-spacing: .07em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 10;
    }

    .identity__badge:hover::after {
      opacity: 1;
      transform: translate(-50%) translateY(0);
    }

    .identity__name {
      margin: .3rem 0 0;
      font-size: .9rem;
      color: var(--text);
      font-weight: 600;
    }

    .identity__pronouns {
      margin: .22rem 0 0;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .identity__location {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      margin-top: .6rem;
      padding: .58rem .85rem;
      border: 1px solid rgba(var(--pink-rgb)/.22);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(var(--pink-rgb)/.07), rgba(var(--pink-rgb)/.03));
      color: rgba(245, 243, 239, .82);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .18), inset 0 1px rgba(var(--pink-rgb)/.1);
    }

    .identity__location svg {
      width: .8rem;
      height: .8rem;
      color: var(--pink);
    }

    .identity__location span {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .identity__bio {
      margin: .65rem auto 0;
      max-width: 32ch;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      line-height: 1.7;
    }

    /* â”€â”€â”€ SOCIAL ROW â”€â”€â”€ */
    .social-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .6rem;
      width: 100%;
    }

    .social-row__link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border-radius: 16px;
      border: 1px solid rgba(255, 105, 180, .13);
      background: rgba(255, 105, 180, .045);
      color: rgba(245, 243, 239, .75);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }

    .social-row__link:hover {
      transform: translateY(-2px);
      border-color: rgba(var(--accent-rgb)/.25);
      background: rgba(var(--accent-rgb)/.08);
      color: var(--text);
    }

    .social-row__link svg {
      width: 1.2rem;
      height: 1.2rem;
    }

    /* â”€â”€â”€ NOW PLAYING BLOCK â”€â”€â”€ */
    .np-block {
      width: 100%;
      border: 1px solid rgba(255, 105, 180, .14);
      border-radius: 16px;
      background: rgba(255, 105, 180, .045);
      overflow: hidden;
    }

    .np-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem .85rem .45rem;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .np-header__label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .56rem;
      color: rgba(245, 243, 239, .38);
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .np-header__date {
      font-family: 'JetBrains Mono', monospace;
      font-size: .56rem;
      color: rgba(245, 243, 239, .28);
      letter-spacing: .07em;
    }

    .np-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .7rem .85rem;
      transition: background .15s;
    }

    .np-item:hover {
      background: rgba(255, 105, 180, .055);
    }

    .np-thumb {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(255, 47, 146, .34), rgba(255, 105, 180, .12));
      border: 1px solid rgba(255, 105, 180, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 209, 234, .72);
    }

    .np-thumb svg {
      width: 1.1rem;
      height: 1.1rem;
    }

    .np-info {
      flex: 1;
      min-width: 0;
    }

    .np-info__track {
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-info__sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: .58rem;
      color: var(--muted);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    audio {
      display: none;
    }

    /* ─── ENTER OVERLAY ─── */
    .enter-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(6, 6, 8, 0.96);
      backdrop-filter: blur(20px);
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: none;
    }

    .enter-overlay.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .enter-overlay__content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      max-width: none;
      width: auto;
      animation: floatOverlay 3s ease-in-out infinite;
    }

    @keyframes floatOverlay {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .enter-overlay__icon {
      display: none;
      width: 70px;
      height: 70px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 105, 180, 0.1);
      border: 1px solid rgba(255, 105, 180, 0.3);
      color: var(--accent);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
    }

    .enter-overlay:hover .enter-overlay__icon {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
      background: rgba(255, 105, 180, 0.2);
    }

    .enter-overlay__icon svg {
      width: 32px;
      height: 32px;
      animation: pulseIcon 2s infinite;
    }

    @keyframes pulseIcon {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    .enter-overlay__title {
      display: none;
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .enter-overlay__subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1rem, 2.4vw, 1.55rem);
      color: #fff;
      letter-spacing: 0.16em;
      font-weight: 700;
      text-transform: lowercase;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.8),
        0 0 18px rgba(255, 105, 180, 0.8),
        0 0 38px rgba(255, 138, 200, 0.45);
      animation: enterTextGlow 1.8s ease-in-out infinite;
    }

    .enter-overlay__loading-bar {
      display: none;
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .enter-overlay__loading-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-strong), var(--accent-soft));
      width: 0%;
      animation: fillBar 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fillBar {
      to {
        width: 100%;
      }
    }

    @keyframes enterTextGlow {
      0%, 100% {
        opacity: 0.82;
        filter: brightness(0.95);
      }

      50% {
        opacity: 1;
        filter: brightness(1.25);
      }
    }

    /* ─── VOLUME STYLING ─── */
    .corner-player__volume {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      overflow: hidden;
      transition: max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      max-width: 2rem;
    }

    .corner-player:hover .corner-player__volume,
    .corner-player__volume:hover,
    .corner-player__volume:focus-within {
      max-width: 140px;
    }

    .volume-slider-container {
      position: relative;
      width: 80px;
      height: 20px;
      display: flex;
      align-items: center;
    }

    .volume-slider-container input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--volume-fill, 60%), rgba(255, 255, 255, 0.15) var(--volume-fill, 60%), rgba(255, 255, 255, 0.15) 100%);
      outline: none;
      cursor: none;
      position: relative;
      z-index: 2;
    }

    .volume-slider-container input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: none;
    }

    .volume-slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      cursor: none;
      margin-top: -3px;
      box-shadow: 0 0 8px var(--accent-strong);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .volume-slider-container input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.3);
      background: var(--accent);
    }

    .volume-slider-container input[type="range"]::-moz-range-track {
      width: 100%;
      height: 4px;
      cursor: none;
      border-radius: 99px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--volume-fill, 60%), rgba(255, 255, 255, 0.15) var(--volume-fill, 60%), rgba(255, 255, 255, 0.15) 100%);
    }

    .volume-slider-container input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: none;
      box-shadow: 0 0 8px var(--accent-strong);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .volume-slider-container input[type="range"]:active::-moz-range-thumb {
      transform: scale(1.3);
      background: var(--accent);
    }

    .volume-slider-glow {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      width: var(--volume-fill, 60%);
      background: var(--accent);
      filter: blur(6px);
      opacity: calc(0.1 + var(--volume-level, 0.6) * 0.5);
      pointer-events: none;
      border-radius: 99px;
      transition: width 0.1s ease, opacity 0.1s ease;
    }

    /* ─── VISUALIZER STYLING ─── */
    .corner-player__visualizer {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      width: 18px;
      margin-left: 0.1rem;
    }

    .corner-player__visualizer .bar {
      width: 3px;
      height: 20%;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 99px;
      transition: height 0.05s ease, background-color 0.3s ease;
    }

    /* --- TOAST NOTIFICATION --- */
    .toast {
      position: fixed;
      bottom: 4.4rem;
      right: 2rem;
      background: rgba(12, 10, 16, 0.88);
      border: 1px solid rgba(255, 105, 180, 0.25);
      backdrop-filter: blur(20px);
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px rgba(255, 255, 255, 0.05);
      z-index: 10000;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* --- VIEW COUNTER --- */
    .view-counter {
      position: fixed;
      right: .85rem;
      bottom: .85rem;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: .48rem;
      padding: .55rem .7rem;
      border: 1px solid rgba(255, 105, 180, .2);
      border-radius: 12px;
      background: rgba(20, 8, 15, .7);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5), 0 0 24px rgba(255, 105, 180, .1), inset 0 1px rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
      color: rgba(245, 243, 239, .82);
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .view-counter svg {
      width: .9rem;
      height: .9rem;
      color: var(--accent-soft);
      filter: drop-shadow(0 0 8px rgba(255, 105, 180, .7));
    }

    .view-counter__number {
      color: #fff;
      text-shadow: 0 0 12px rgba(255, 105, 180, .65);
    }

    /* --- CRYPTO TOGGLE BUTTON --- */
    .crypto-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.8rem 1rem;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .crypto-toggle-btn:hover {
      background: rgba(255, 105, 180, 0.1);
      border-color: rgba(255, 105, 180, 0.3);
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.2);
      transform: translateY(-1px);
    }

    .crypto-toggle-btn svg {
      transition: transform 0.3s ease;
    }

    .crypto-toggle-btn:hover svg {
      transform: rotate(15deg) scale(1.1);
    }

    .crypto-toggle-btn.active {
      background: rgba(255, 105, 180, 0.12);
      border-color: rgba(255, 105, 180, 0.35);
      color: #fff;
      box-shadow: 0 0 25px rgba(255, 105, 180, 0.2);
    }

    /* --- LANGUAGES TOGGLE BUTTON --- */
    .languages-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      margin-top: 0.7rem;
      padding: 0.8rem 1rem;
      border-radius: 14px;
      border: 1px solid rgba(96, 165, 250, 0.15);
      background: rgba(96, 165, 250, 0.05);
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: none;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .languages-toggle-btn:hover {
      background: rgba(96, 165, 250, 0.14);
      border-color: rgba(96, 165, 250, 0.35);
      color: #fff;
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.16);
      transform: translateY(-1px);
    }

    .languages-toggle-btn svg {
      transition: transform 0.3s ease;
    }

    .languages-toggle-btn:hover svg {
      transform: rotate(-10deg) scale(1.08);
    }

    .languages-toggle-btn.active {
      background: rgba(96, 165, 250, 0.12);
      border-color: rgba(96, 165, 250, 0.4);
      color: #fff;
      box-shadow: 0 0 25px rgba(96, 165, 250, 0.18);
    }

    /* --- LANGUAGES MIND MAP --- */
    .languages-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
    }

    .language-node {
      position: absolute;
      width: min(78vw, 190px);
      padding: 0.85rem 0.95rem;
      border-radius: 16px;
      border: 1px solid rgba(96, 165, 250, .14);
      background: linear-gradient(180deg, rgba(255, 255, 255, .075), rgba(255, 255, 255, .03)), rgba(10, 12, 18, .9);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .04) inset, 0 1px rgba(255, 255, 255, .07) inset, 0 22px 54px rgba(0, 0, 0, .58);
      backdrop-filter: blur(24px);
      opacity: 0;
      transform: scale(0.85) translate3d(var(--node-shift-x, -28px), 0, 0);
      pointer-events: none;
      transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1), transform 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: none;
    }

    .language-node::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.42), transparent 36%, rgba(34, 211, 238, 0.24));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .language-node.active {
      opacity: 1;
      transform: scale(1) translate3d(0, 0, 0);
      pointer-events: all;
    }

    .language-node:hover {
      border-color: rgba(96, 165, 250, 0.34);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .04) inset, 0 0 28px rgba(96, 165, 250, 0.13), 0 22px 54px rgba(0, 0, 0, .58);
    }

    .language-node:hover::before {
      opacity: 0.42;
    }

    .language-node__header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .language-node__dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 9px currentColor;
    }

    .language-node__name {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
    }

    .language-node__meta {
      margin-top: 0.15rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* --- CRYPTO MIND MAP --- */
    .crypto-mindmap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
    }

    .crypto-mindmap.active {
      pointer-events: none;
    }

    .crypto-node {
      position: absolute;
      width: min(85vw, 300px);
      padding: 1rem 1.1rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, .09);
      background: linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .03)), rgba(12, 10, 16, .88);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .04) inset, 0 1px rgba(255, 255, 255, .07) inset, 0 25px 60px rgba(0, 0, 0, .6);
      backdrop-filter: blur(25px);
      opacity: 0;
      transform: scale(0.85) translate3d(var(--node-shift-x, 10px), 0, 0);
      pointer-events: none;
      transition: opacity 0.45s cubic-bezier(0.25, 1, 0.5, 1), transform 0.45s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: none;
    }

    .crypto-node::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 105, 180, 0.42), transparent 34%, rgba(255, 138, 200, 0.24));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .crypto-node.active {
      opacity: 1;
      transform: scale(1) translate3d(0, 0, 0);
      pointer-events: all;
    }

    .crypto-node:hover {
      border-color: rgba(255, 105, 180, 0.25);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .04) inset, 0 0 30px rgba(255, 105, 180, 0.12), 0 25px 60px rgba(0, 0, 0, .6);
    }

    .crypto-node:hover::before {
      opacity: 0.4;
    }

    .crypto-node__header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.55rem;
    }

    .crypto-node__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .crypto-node__name {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    .crypto-node__addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      line-height: 1.45;
      word-break: break-all;
      margin-bottom: 0.6rem;
    }

    .crypto-node__copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.45rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: none;
      transition: all 0.25s ease;
    }

    .crypto-node:hover .crypto-node__copy {
      background: rgba(255, 105, 180, 0.1);
      border-color: rgba(255, 105, 180, 0.25);
      color: #fff;
    }

    .crypto-node__copy.copied {
      background: rgba(74, 222, 128, 0.14);
      border-color: rgba(74, 222, 128, 0.32);
      color: #fff;
    }

    /* --- CONNECTING WIRES --- */
    .connecting-wire {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 98;
      overflow: visible;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .connecting-wire.active {
      opacity: 1;
    }

    .language-wire {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 98;
      overflow: visible;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .language-wire.active {
      opacity: 1;
    }

    .wire-path-back {
      fill: none;
      stroke: rgba(255, 105, 180, 0.08);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .wire-path {
      fill: none;
      stroke: url(#wire-gradient);
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(255, 105, 180, 0.35));
    }

    .wire-path.drawing {
      transition: stroke-dashoffset 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .wire-path.flowing {
      stroke-dasharray: 9 22;
      animation: wireEnergy 0.9s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 105, 180, 0.75));
    }

    .wire-path-glow {
      fill: none;
      stroke: rgba(255, 105, 180, 0.5);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-dasharray: 5 28;
      animation: wireEnergy 0.62s linear infinite;
      opacity: 0.7;
    }

    .wire-path-glow.waiting {
      opacity: 0;
    }

    .language-wire-path-back {
      fill: none;
      stroke: rgba(96, 165, 250, 0.08);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .language-wire-path {
      fill: none;
      stroke: url(#language-wire-gradient);
      stroke-width: 3;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(96, 165, 250, 0.35));
    }

    .language-wire-path.drawing {
      transition: stroke-dashoffset 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .language-wire-path.flowing {
      stroke-dasharray: 9 22;
      animation: wireEnergy 0.9s linear infinite;
      filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.75));
    }

    .language-wire-path-glow {
      fill: none;
      stroke: rgba(96, 165, 250, 0.48);
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-dasharray: 5 28;
      animation: wireEnergy 0.62s linear infinite;
      opacity: 0.7;
    }

    .language-wire-path-glow.waiting {
      opacity: 0;
    }

    @keyframes wireEnergy {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -46; }
    }

    body.crypto-open {
      overflow: auto;
    }

    body.crypto-open .scene {
      overflow: visible;
    }

    @media (max-width: 768px) {
      body.crypto-open .profile {
        transform: none;
      }

      body.crypto-open .scene {
        min-height: auto;
        padding: 2rem 0;
      }

      body.crypto-open .profile {
        gap: 1rem;
      }

      .languages-panel {
        position: static;
        display: flex;
        flex-direction: column;
        width: 100%;
        height: auto;
        margin-top: 24px;
        pointer-events: all;
      }

      .languages-panel:not(.active) {
        display: none;
      }

      .language-node {
        position: static !important;
        width: 100% !important;
        margin-bottom: 12px;
      }

      .crypto-node {
        position: static !important;
        width: 100% !important;
        margin-bottom: 12px;
      }

      .crypto-mindmap {
        position: static;
        display: flex;
        flex-direction: column;
        width: 100%;
        margin-top: 24px;
        pointer-events: all;
      }

      .connecting-wire {
        display: none;
      }

      .language-wire {
        display: none;
      }
    }

    @media(max-width:520px) {
      .profile-card {
        border-radius: 18px;
        width: calc(100vw - 1.5rem);
      }

      .card-banner {
        height: 155px;
      }

      .card-body {
        padding-inline: .85rem;
      }

      .identity__head h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

    </button>
    <div class="corner-player__copy">

    <!-- VISUALIZER -->

    <!-- VOLUME CONTROL -->
    <div class="corner-player__volume">
      <button class="corner-player__btn" id="volume-btn" aria-label="Mute / Unmute">
        <svg id="ico-volume-high" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M13.5 4.07v15.86c0 .93-1.09 1.43-1.8 1.02l-5.5-3.14H3.75A1.75 1.75 0 012 16.06V7.94c0-.97.78-1.75 1.75-1.75h2.45l5.5-3.14c.71-.41 1.8.09 1.8 1.02zM18.5 12c0-2.48-1.39-4.63-3.41-5.71a.75.75 0 00-.77 1.29 5.002 5.002 0 010 8.84.75.75 0 10.77 1.29c2.02-1.08 3.41-3.23 3.41-5.71zm3.5 0c0-4.32-2.72-8.01-6.53-9.45a.75.75 0 10-.53 1.4C18.15 5.09 20.5 8.27 20.5 12s-2.35 6.91-5.03 8.05a.75.75 0 10.53 1.4C19.28 20.01 22 16.32 22 12z" />
        </svg>
        <svg id="ico-volume-low" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path
            d="M13.5 4.07v15.86c0 .93-1.09 1.43-1.8 1.02l-5.5-3.14H3.75A1.75 1.75 0 012 16.06V7.94c0-.97.78-1.75 1.75-1.75h2.45l5.5-3.14c.71-.41 1.8.09 1.8 1.02zM18.5 12c0-2.48-1.39-4.63-3.41-5.71a.75.75 0 00-.77 1.29 5.002 5.002 0 010 8.84.75.75 0 10.77 1.29c2.02-1.08 3.41-3.23 3.41-5.71z" />
        </svg>

    const card = document.getElementById('card');

    function onCardMove(e) {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      const dx = x - .5, dy = y - .5;
      const rx = Math.sign(dy) * Math.pow(Math.abs(dy) * 2, 1.6) * 22;
      const ry = -Math.sign(dx) * Math.pow(Math.abs(dx) * 2, 1.6) * 20;
      const sx = dx * 16, sy = dy * 14;
      card.style.setProperty('--rx', `${-rx}deg`);
      card.style.setProperty('--ry', `${-ry}deg`);
      card.style.setProperty('--sx', `${sx}px`);
      card.style.setProperty('--sy', `${sy}px`);
      card.style.setProperty('--gx', `${x * 100}%`);
      card.style.setProperty('--gy', `${y * 100}%`);
      card.classList.add('tilting');
      card.style.transition = 'transform .05s ease,box-shadow .05s ease';
    }

    function onCardLeave() {
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--sx', '0px');
      card.style.setProperty('--sy', '0px');
      card.style.setProperty('--gx', '50%');
      card.style.setProperty('--gy', '28%');
      card.classList.remove('tilting');
      card.style.transition = 'transform .6s cubic-bezier(.23,1,.32,1),box-shadow .6s ease';
    }

    // â”€â”€ AUDIO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const audio = document.getElementById('audio');
    let isPlaying = false;
    audio.volume = 0.6;

    const volumeSlider = document.getElementById('volume-slider');
    const volumeBtn = document.getElementById('volume-btn');
    const visualizer = document.getElementById('visualizer');
    const bars = visualizer.querySelectorAll('.bar');
    let visualizerRAF = null;
    let preMuteVolume = 0.6;

    function toggleAudio() {
      if (isPlaying) { audio.pause(); }
      else { audio.play().catch(() => { }); }
    }

    function updateVolumeUI(val) {
      volumeSlider.style.setProperty('--volume-fill', `${val * 100}%`);
      volumeSlider.style.setProperty('--volume-level', val);
      document.querySelector('.volume-slider-glow').style.setProperty('--volume-fill', `${val * 100}%`);
      document.querySelector('.volume-slider-glow').style.setProperty('--volume-level', val);

      const icoHigh = document.getElementById('ico-volume-high');
      const icoLow = document.getElementById('ico-volume-low');
      const icoMute = document.getElementById('ico-volume-mute');

      if (val == 0 || audio.muted) {
        icoHigh.style.display = 'none';
        icoLow.style.display = 'none';
        icoMute.style.display = '';
      } else if (val < 0.5) {
        icoHigh.style.display = 'none';
        icoLow.style.display = '';
        icoMute.style.display = 'none';
      } else {
        icoHigh.style.display = '';
        icoLow.style.display = 'none';
        icoMute.style.display = 'none';
      }
    }

    volumeSlider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      audio.volume = val;
      audio.muted = (val === 0);
      updateVolumeUI(val);
    });

    volumeBtn.addEventListener('click', () => {
      if (audio.muted || audio.volume === 0) {
        audio.muted = false;
        audio.volume = preMuteVolume > 0 ? preMuteVolume : 0.6;
        volumeSlider.value = audio.volume;
      } else {
        preMuteVolume = audio.volume;
        audio.muted = true;
        audio.volume = 0;
        volumeSlider.value = 0;
      }
      updateVolumeUI(audio.volume);
    });

    function animateVisualizer() {
      if (isPlaying) {
        const vol = audio.volume;
        bars.forEach((bar) => {
          const minHeight = 20;
          const maxHeight = 100;
          const randomHeight = minHeight + Math.random() * (maxHeight - minHeight) * (audio.muted ? 0 : vol);
          bar.style.height = `${randomHeight}%`;
          bar.style.background = `rgba(255, 105, 180, ${0.4 + (audio.muted ? 0 : vol) * 0.6})`;
        });
        setTimeout(() => {
          visualizerRAF = requestAnimationFrame(animateVisualizer);
        }, 70);
      } else {
        bars.forEach(bar => {
          bar.style.height = '20%';
          bar.style.background = 'rgba(255, 255, 255, 0.2)';
        });
      }
    }

    audio.addEventListener('play', () => {
      isPlaying = true;
      syncPlayer();
      animateVisualizer();
    });
    audio.addEventListener('pause', () => {
      isPlaying = false;
      syncPlayer();
      cancelAnimationFrame(visualizerRAF);
      animateVisualizer();
    });
    audio.addEventListener('ended', () => {
      isPlaying = false;
      syncPlayer();
      cancelAnimationFrame(visualizerRAF);
      animateVisualizer();
    });

    function syncPlayer() {
      document.getElementById('ico-play').style.display = isPlaying ? 'none' : '';
      document.getElementById('ico-pause').style.display = isPlaying ? '' : 'none';
    }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        document.getElementById('audio-fill').style.width =
          (audio.currentTime / audio.duration * 100).toFixed(2) + '%';

    const viewCountEl = document.getElementById('view-count');
    const viewCountBase = 7000;
    const viewCounterUrl = 'https://api.countify.xyz/increment/yayko-portfolio-main';

    function formatViews(value) {
      return Math.max(viewCountBase, Math.round(value)).toLocaleString('fr-FR');
    }

    function animateViewCount(toValue) {
      const fromValue = viewCountBase;
      const duration = 900;
      const start = performance.now();

      function tick(now) {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = fromValue + (toValue - fromValue) * eased;
        viewCountEl.textContent = formatViews(current);

        if (progress < 1) {
          requestAnimationFrame(tick);
        }
      }

      requestAnimationFrame(tick);
    }

    async function updateViewCounter() {
      let finalCount = viewCountBase;

      try {
        const response = await fetch(viewCounterUrl, {
          method: 'POST',
          cache: 'no-store'
        });
        if (!response.ok) throw new Error('View counter unavailable');
        const data = await response.json();
        finalCount = viewCountBase + Number(data.value || data.count || data.total || 0);
      } catch (error) {
        const localKey = 'yayko-local-views';
        const localViews = Number(localStorage.getItem(localKey) || 0) + 1;
        localStorage.setItem(localKey, String(localViews));
        finalCount = viewCountBase + localViews;
      }

      animateViewCount(finalCount);
    }

    }

    function clearLanguageTimers() {
      languageTimers.forEach(timer => clearTimeout(timer));
      languageTimers = [];
    }

    function createLanguagesMindmap() {
      languagesPanel.innerHTML = '';
      languageWire.querySelectorAll('.language-wire-path-back, .language-wire-path, .language-wire-path-glow').forEach(path => path.remove());

      languageNodes = programmingLanguages.map((language, index) => {
        const node = document.createElement('article');
        node.className = 'language-node';
        node.dataset.index = index;
        node.style.setProperty('--node-shift-x', '-28px');
        node.innerHTML = `
          <div class="language-node__header">
            <span class="language-node__dot" style="color: ${language.color}; background: ${language.color};"></span>
            <div>
              <div class="language-node__name">${language.name}</div>
              <div class="language-node__meta">${language.short}</div>
            </div>
          </div>
        `;

        languagesPanel.appendChild(node);
        return node;
      });

      languageWireGroups = programmingLanguages.map(() => {
        const back = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const main = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');

        back.setAttribute('class', 'language-wire-path-back');
        main.setAttribute('class', 'language-wire-path drawing');
        glow.setAttribute('class', 'language-wire-path-glow waiting');

        languageWire.append(back, main, glow);
        return { back, main, glow };
      });
    }

    function getLanguageNodePosition(index, nodeWidth, nodeHeight, cardRect, profileRect) {
      const mobile = window.innerWidth <= 768;
      if (mobile) {
        return { left: 0, top: 0 };
      }

      const cardLeft = cardRect.left - profileRect.left;
      const cardCenterY = cardRect.top + cardRect.height / 2 - profileRect.top;
      const availableGap = cardLeft - nodeWidth;
      const gap = Math.min(230, Math.max(120, availableGap * 0.36));
      const spacing = Math.min(118, Math.max(92, nodeHeight + 34));
      const yOffset = (index - (languageNodes.length - 1) / 2) * spacing;
      const left = cardLeft - gap - nodeWidth;

      return {
        left: Math.max(12, left),
        top: cardCenterY + yOffset - nodeHeight / 2
      };
    }

    function updateLanguagesMindmap() {
      if (!isLanguagesActive) return;

      const cardRect = mainCard.getBoundingClientRect();
      const profileRect = profile.getBoundingClientRect();
      const mobile = window.innerWidth <= 768;

      if (mobile) {
        languageNodes.forEach(node => {
          node.style.left = '';
          node.style.top = '';
        });
        return;
      }

      const startY = cardRect.top + cardRect.height / 2 - profileRect.top;

      languageNodes.forEach((node, index) => {
        const nodeRect = node.getBoundingClientRect();
        const nodeWidth = nodeRect.width || 190;
        const nodeHeight = nodeRect.height || 62;
        const position = getLanguageNodePosition(index, nodeWidth, nodeHeight, cardRect, profileRect);

        node.style.left = `${position.left}px`;
        node.style.top = `${position.top}px`;

        const endY = position.top + nodeHeight / 2;
        const cardEdgeX = cardRect.left - profileRect.left;
        const nodeEdgeX = position.left + nodeWidth;
        const distance = Math.max(150, cardEdgeX - nodeEdgeX);
        const trunkX = cardEdgeX - Math.min(190, Math.max(90, distance * 0.42));
        const branchBend = Math.max(48, (trunkX - nodeEdgeX) * 0.52);
        const rootBend = Math.max(58, distance * 0.22);
        const pathData = `M ${cardEdgeX} ${startY} C ${cardEdgeX - rootBend} ${startY}, ${trunkX + rootBend * 0.45} ${startY}, ${trunkX} ${startY} L ${trunkX} ${endY} C ${trunkX - branchBend} ${endY}, ${nodeEdgeX + branchBend * 0.55} ${endY}, ${nodeEdgeX} ${endY}`;
        const group = languageWireGroups[index];

        group.back.setAttribute('d', pathData);
        group.main.setAttribute('d', pathData);
        group.glow.setAttribute('d', pathData);
      });
    }

    function animateLanguagesOpen() {
      clearLanguageTimers();
      updateLanguagesMindmap();
      languageWireGroups.forEach((group, index) => {
        const length = group.main.getTotalLength();
        group.main.classList.remove('flowing');
        group.glow.classList.add('waiting');
        group.main.style.transitionDelay = `${index * 95}ms`;
        group.main.style.strokeDasharray = length;
        group.main.style.strokeDashoffset = length;
        group.main.getBoundingClientRect();
        group.main.style.strokeDashoffset = '0';
        languageTimers.push(setTimeout(() => {
          group.main.style.strokeDasharray = '';
          group.main.style.strokeDashoffset = '';
          group.main.classList.add('flowing');
          group.main.style.transitionDelay = '';
          group.glow.classList.remove('waiting');
        }, 850 + index * 95));
      });

      languageNodes.forEach((node, index) => {
        languageTimers.push(setTimeout(() => node.classList.add('active'), 260 + index * 95));
      });
    }

    function closeLanguagesPanel() {
      clearLanguageTimers();
      isLanguagesActive = false;
      languagesToggle.classList.remove('active');
      languagesToggle.setAttribute('aria-expanded', 'false');
      languagesPanel.classList.remove('active');
      languagesPanel.setAttribute('aria-hidden', 'true');
      languageNodes.forEach(node => node.classList.remove('active'));
      languageWireGroups.forEach((group, index) => {
        const length = group.main.getTotalLength();
        group.main.classList.remove('flowing');
        group.glow.classList.add('waiting');
        group.main.style.strokeDasharray = length;
        group.main.style.strokeDashoffset = length;
        group.main.style.transitionDelay = `${index * 35}ms`;
      });
      languageTimers.push(setTimeout(() => {
        languageWire.classList.remove('active');
      }, 380));
    }

    function openLanguagesPanel() {
      clearLanguageTimers();
      isLanguagesActive = true;
      languagesToggle.classList.add('active');
      languagesToggle.setAttribute('aria-expanded', 'true');
      languagesPanel.classList.add('active');
      languagesPanel.setAttribute('aria-hidden', 'false');
      languageWire.classList.add('active');
      requestAnimationFrame(animateLanguagesOpen);
    }

    function toggleLanguagesPanel() {
      if (isLanguagesActive) {
        closeLanguagesPanel();
        return;
      }

      openLanguagesPanel();
    }

    function createCryptoMindmap() {
      cryptoMindmap.innerHTML = '';
      wire.querySelectorAll('.wire-path-back, .wire-path, .wire-path-glow').forEach(path => path.remove());

      cryptoNodes = cryptoWallets.map((wallet, index) => {
        const node = document.createElement('article');
        node.className = 'crypto-node';
        node.dataset.index = index;
        node.style.setProperty('--node-shift-x', '28px');
        node.innerHTML = `
          <div class="crypto-node__header">
            <span class="crypto-node__dot" style="color: ${wallet.color}; background: ${wallet.color};"></span>
            <div>
              <div class="crypto-node__name">${wallet.name}</div>
              <div class="np-info__sub">${wallet.short}</div>
            </div>
          </div>
          <div class="crypto-node__addr">${wallet.address}</div>
          <button class="crypto-node__copy" type="button" aria-label="Copier ${wallet.name}">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="9" y="9" width="11" height="11" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copier
          </button>
        `;

        const copyBtn = node.querySelector('.crypto-node__copy');
        copyBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          copyCrypto(wallet.name, wallet.address);
          copyBtn.classList.add('copied');
          copyBtn.lastChild.textContent = ' Copie';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.lastChild.textContent = ' Copier';
          }, 1200);
        });

        cryptoMindmap.appendChild(node);
        return node;
      });

      wireGroups = cryptoWallets.map(() => {
        const back = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const main = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');

        back.setAttribute('class', 'wire-path-back');
        main.setAttribute('class', 'wire-path drawing');
        glow.setAttribute('class', 'wire-path-glow waiting');

        wire.append(back, main, glow);
        return { back, main, glow };
      });
    }

    function getNodePosition(index, nodeWidth, nodeHeight, cardRect, profileRect) {
      const mobile = window.innerWidth <= 768;
      if (mobile) {
        return { left: 0, top: 0 };
      }

      const cardRight = cardRect.right - profileRect.left;
      const cardCenterY = cardRect.top + cardRect.height / 2 - profileRect.top;
      const profileWidth = profileRect.width;
      const availableGap = profileWidth - cardRect.width - nodeWidth;
      const gap = Math.min(310, Math.max(190, availableGap * 0.42));
      const spacing = Math.min(230, Math.max(180, nodeHeight + 72));
      const yOffset = (index - (cryptoNodes.length - 1) / 2) * spacing;
      const left = cardRight + gap;
      const rightBreathingRoom = Math.min(260, Math.max(120, window.innerWidth * 0.16));

      return {
        left: Math.max(12, Math.min(left, profileWidth + rightBreathingRoom - nodeWidth - 12)),
        top: cardCenterY + yOffset - nodeHeight / 2
      };
    }

    function updateCryptoMindmap() {
      if (!isCryptoActive) return;

      const cardRect = mainCard.getBoundingClientRect();
      const profileRect = profile.getBoundingClientRect();
      const mobile = window.innerWidth <= 768;

      if (mobile) {
        cryptoNodes.forEach(node => {
          node.style.left = '';
          node.style.top = '';
        });
        return;
      }

      const startY = cardRect.top + cardRect.height / 2 - profileRect.top;

      cryptoNodes.forEach((node, index) => {
        const nodeRect = node.getBoundingClientRect();
        const nodeWidth = nodeRect.width || 300;
        const nodeHeight = nodeRect.height || 116;
        const position = getNodePosition(index, nodeWidth, nodeHeight, cardRect, profileRect);

        node.style.left = `${position.left}px`;
        node.style.top = `${position.top}px`;

        const endY = position.top + nodeHeight / 2;
        const cardEdgeX = cardRect.right - profileRect.left;
        const nodeEdgeX = position.left;
        const distance = Math.max(260, nodeEdgeX - cardEdgeX);
        const trunkX = cardEdgeX + Math.min(235, Math.max(150, distance * 0.42));
        const branchBend = Math.max(70, (nodeEdgeX - trunkX) * 0.5);
        const rootBend = Math.max(80, distance * 0.22);
        const pathData = `M ${cardEdgeX} ${startY} C ${cardEdgeX + rootBend} ${startY}, ${trunkX - rootBend * 0.45} ${startY}, ${trunkX} ${startY} L ${trunkX} ${endY} C ${trunkX + branchBend} ${endY}, ${nodeEdgeX - branchBend * 0.55} ${endY}, ${nodeEdgeX} ${endY}`;
        const group = wireGroups[index];

        group.back.setAttribute('d', pathData);
        group.main.setAttribute('d', pathData);
        group.glow.setAttribute('d', pathData);
      });
    }

    function animateCryptoOpen() {
      clearCryptoTimers();
      updateCryptoMindmap();
      mainCard.classList.remove('crypto-weaving');
      mainCard.getBoundingClientRect();
      mainCard.classList.add('crypto-weaving');
      wireGroups.forEach((group, index) => {
        const length = group.main.getTotalLength();
        group.main.classList.remove('flowing');
        group.glow.classList.add('waiting');
        group.main.style.transitionDelay = `${index * 120}ms`;
        group.main.style.strokeDasharray = length;
        group.main.style.strokeDashoffset = length;
        group.main.getBoundingClientRect();
        group.main.style.strokeDashoffset = '0';
        cryptoTimers.push(setTimeout(() => {
          group.main.style.strokeDasharray = '';
          group.main.style.strokeDashoffset = '';
          group.main.classList.add('flowing');
          group.main.style.transitionDelay = '';
          group.glow.classList.remove('waiting');
        }, 950 + index * 120));
      });

      cryptoNodes.forEach((node, index) => {
        cryptoTimers.push(setTimeout(() => node.classList.add('active'), 320 + index * 120));
      });

      cryptoTimers.push(setTimeout(() => {
        mainCard.classList.remove('crypto-weaving');
      }, 1300));
    }

    function closeCryptoMindmap() {
      clearCryptoTimers();
      isCryptoActive = false;
      cryptoToggle.classList.remove('active');
      cryptoMindmap.classList.remove('active');
      document.body.classList.remove('crypto-open');
      mainCard.classList.remove('crypto-weaving');
      cryptoNodes.forEach(node => node.classList.remove('active'));
      wireGroups.forEach((group, index) => {
        const length = group.main.getTotalLength();
        group.main.classList.remove('flowing');
        group.glow.classList.add('waiting');
        group.main.style.strokeDasharray = length;
        group.main.style.strokeDashoffset = length;
        group.main.style.transitionDelay = `${index * 45}ms`;
      });
      cryptoTimers.push(setTimeout(() => {
        wire.classList.remove('active');
      }, 420));
    }

    function openCryptoMindmap() {
      clearCryptoTimers();
      isCryptoActive = true;
      cryptoToggle.classList.add('active');
      cryptoMindmap.classList.add('active');
      document.body.classList.add('crypto-open');
      wire.classList.add('active');
      requestAnimationFrame(animateCryptoOpen);
    }

    function toggleCrypto() {
      if (isCryptoActive) {
        closeCryptoMindmap();
        return;
      }

      openCryptoMindmap();
    }

    createCryptoMindmap();
    createLanguagesMindmap();
    cryptoToggle.addEventListener('click', toggleCrypto);
    languagesToggle.addEventListener('click', toggleLanguagesPanel);
    window.addEventListener('resize', () => {
      if (isCryptoActive) {
        updateCryptoMindmap();
      }
      if (isLanguagesActive) {
        updateLanguagesMindmap();
      }
    });
  </script>
  <!-- TOAST -->
  <div id="toast" class="toast">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
      style="color: var(--accent)">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke-linecap="round" stroke-linejoin="round" />
      <polyline points="22 4 12 14.01 9 11.01" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <span id="toast-text"></span>
  </div>
</body>
