<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenderID - GZ Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared-profile.css">
    <style>
        :root {
            --accent: #00cfff;
            --accent-rgb: 0, 207, 255;
            --accent-glow: rgba(0, 207, 255, .45);
        }
    </style>
</head>

<body>
    <div class="bg-wrap">
        <div class="grid"></div>
        <div class="ambient"></div>
    </div>

    <main class="page-wrap">
        <section class="profile-card">
            <div class="avatar-wrap">
                <div class="avatar-ring-spin"></div>
                <div class="avatar-inner avatar-photo">
                    <img src="senderid.webp" alt="Avatar de SenderID">
                </div>
            </div>

            <div class="profile-identity">
                <div class="badges">
                    <span class="badge badge-primary">GZ Data</span>
                </div>
                <h1 class="profile-name">SenderID</h1>
                <div class="bio-wrap">
                    <p class="bio">Developer</p>
                </div>
            </div>
        </section>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Retour</span>
        </a>
    </main>
</body>

</html>
